name: Demo Check

on:
  push:
  pull_request:

jobs:
  demo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: GitHub publish safety check
        run: node scripts/github-prepublish-check.mjs

      - name: Full demo check
        run: bash scripts/demo-check.sh
