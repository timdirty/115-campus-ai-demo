; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<motor_test/>
lib_deps =
    arduino-libraries/Servo@^1.3.0
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

[env:uno_r4_minima]
platform = renesas-ra
board = uno_r4_minima
framework = arduino
monitor_speed = 115200
build_src_filter = +<motor_test/>
upload_protocol = dfu
board_upload.use_1200bps_touch = true
board_upload.wait_for_upload_port = true
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

; HY-M302 sensor node on R4 WiFi board — same source as uno_r4_minima,
; uploads via CMSIS-DAP (no DFU / double-reset needed).
; Use when only the R4 WiFi is available or for mixed-board setups.
[env:uno_r4_wifi_sensor]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200
build_src_filter = +<motor_test/>
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
